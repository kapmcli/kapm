name: CI
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go build -o internal/agent/kapl ./cmd/kapl
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout 5m
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go build -o internal/agent/kapl ./cmd/kapl
      - run: go test -race -shuffle=on ./cmd/... ./internal/...
  test-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go build -o internal/agent/kapl ./cmd/kapl
      - run: go test -tags=e2e ./internal/e2e/...
