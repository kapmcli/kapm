{{define "layout"}}<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>{{.Title}} — kapm</title>
<link rel="stylesheet" href="/assets/style.css">
<script src="/assets/htmx.min.js"></script>
<script src="/assets/htmx-sse.js"></script>
<script src="/assets/idiomorph-ext.min.js"></script>
<script src="/assets/echarts.min.js"></script>
<script src="/assets/js/localtime.js" defer></script>
<script src="/assets/js/charts-bootstrap.js" defer></script>
<script src="/assets/js/tool-detail-charts.js" defer></script>
</head>
<script>
// Preserve <details> open state across htmx morph swaps.
document.addEventListener('htmx:beforeSwap', function(e) {
  if (!e.detail.target || e.detail.target.id !== 'content') return;
  var open = [];
  e.detail.target.querySelectorAll('details[open][id]').forEach(function(d) {
    open.push(d.id);
  });
  window._kapmOpenDetails = open;
});
document.addEventListener('htmx:afterSettle', function() {
  var open = window._kapmOpenDetails;
  if (!open || !open.length) return;
  window._kapmOpenDetails = null;
  open.forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.open = true;
  });
  // Sync expand-all button text with restored state.
  document.querySelectorAll('.change-group').forEach(function(g) {
    var btn = g.querySelector('.btn-expand-all');
    if (!btn) return;
    var diffs = g.querySelectorAll('details.edit-diff');
    var allOpen = Array.prototype.every.call(diffs, function(d) { return d.open; });
    if (allOpen) btn.textContent = 'Hide all diffs';
  });
});
// Toggle all diff <details> within a change-group.
function toggleAllDiffs(btn) {
  var group = btn.closest('.change-group');
  var diffs = group.querySelectorAll('details.edit-diff');
  var anyOpen = Array.prototype.some.call(diffs, function(d) { return d.open; });
  diffs.forEach(function(d) { d.open = !anyOpen; });
  btn.textContent = anyOpen ? 'Show all diffs' : 'Hide all diffs';
}
</script>
<body hx-ext="morph">
<div class="layout">
<header>
<h1>kapm</h1>
<div class="header-right">
<nav id="main-nav">
{{template "nav" .}}
</nav>
<span id="updated-at" class="updated-at">updated: {{.UpdatedAt}}</span>
</div>
</header>
<main id="content">
{{template "content" .}}
</main>
</div>
</body>
</html>
{{end}}

{{define "nav"}}
{{- $active := .Active -}}
{{- range .Nav}}
<a href="{{.Href}}" hx-get="{{.Href}}" hx-target="#content" hx-push-url="true"{{if eq .Key $active}} class="active"{{end}}>{{.Label}}</a>
{{- end}}
{{end}}
