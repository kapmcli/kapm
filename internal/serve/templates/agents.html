{{define "content"}}
<section class="card">
  <div class="card-title">Agents</div>
  <table>
    <thead><tr><th>Name</th><th>Sessions</th><th>Tool calls</th><th>Prompts</th></tr></thead>
    <tbody>
    {{- range .Agents}}
      <tr hx-get="/agents/{{.Name}}" hx-target="#content" hx-push-url="true" style="cursor:pointer">
        <td><a href="/agents/{{.Name}}">{{.Name}}</a></td>
        <td>{{.SessionCount}}</td>
        <td>{{.ToolCalls}}</td>
        <td>{{.Prompts}}</td>
      </tr>
    {{- else}}
      <tr><td colspan="4" class="muted">No agents</td></tr>
    {{- end}}
    </tbody>
  </table>
</section>
{{end}}
