version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - revive
  settings:
    revive:
      rules:
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true
        - name: var-naming
          disabled: true
        - name: unused-parameter
          disabled: true
        - name: redefines-builtin-id
          disabled: true
        # add more disabled rules here if revive fires new issues
